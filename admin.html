<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления бонусами</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: var(--accent-color); }
        p.subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-val { font-size: 32px; font-weight: bold; color: var(--success-color); margin-top: 5px; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
        th { background-color: rgba(0,0,0,0.2); color: var(--text-muted); font-weight: 600; }
        tr:hover { background-color: rgba(255,255,255,0.02); }
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background-color: #ef4444; color: white; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Панель управления подписчиками (Локальная демо-БД)</h1>
        <p class="subtitle">Здесь отображаются email-адреса, сохраненные через форму «Закрытой рассылки бонусов» в localStorage вашего браузера.</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div>Всего подписчиков</div>
                <div class="stat-val" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div>Последнее обновление</div>
                <div class="stat-val" id="lastUpdate" style="font-size: 14px; color: var(--text-muted); margin-top: 15px;">—</div>
            </div>
        </div>

        <div class="actions-bar">
            <h2>Список адресов</h2>
            <div>
                <button class="btn" onclick="exportCSV()">Экспорт в CSV</button>
                <button class="btn btn-danger" onclick="clearDatabase()">Очистить БДО</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email-адрес</th>
                        <th>Дата и время подписки</th>
                    </tr>
                </thead>
                <tbody id="emailsTableBody">
                    <!-- Данные генерируются динамически -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">Список подписчиков пока пуст.</div>
        </div>
    </div>

    <script>
        function loadEmails() {
            const emails = JSON.parse(localStorage.getItem('subscribed_emails') || '[]');
            const tbody = document.getElementById('emailsTableBody');
            const emptyState = document.getElementById('emptyState');
            
            tbody.innerHTML = '';
            document.getElementById('totalCount').innerText = emails.length;
            
            if (emails.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            emails.reverse().forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="color: var(--text-muted);">${emails.length - index}</td>
                    <td style="font-weight: 500;">${escapeHtml(item.email)}</td>
                    <td>${new Date(item.date).toLocaleString('ru-RU')}</td>
                `;
                tbody.appendChild(row);
            });
            
            if(emails.length > 0) {
                document.getElementById('lastUpdate').innerText = new Date(emails[0].date).toLocaleTimeString('ru-RU');
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function clearDatabase() {
            if (confirm('Вы уверены, что хотите удалить все сохраненные email?')) {
                localStorage.removeItem('subscribed_emails');
                loadEmails();
                document.getElementById('lastUpdate').innerText = '—';
            }
        }

        function exportCSV() {
            const emails = JSON.parse(localStorage.getItem('subscribed_emails') || '[]');
            if(emails.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,ID,Email,Date\n";
            emails.forEach((item, index) => {
                csvContent += `${index + 1},${item.email},${item.date}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "subscribed_emails.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.addEventListener('DOMContentLoaded', loadEmails);
    </script>
</body>
</html>
